services:
  app:
    build: .
    ports:
      - "9100:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:userdb
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_H2_CONSOLE_ENABLED=true

  frontend:
    build: ./fe
    ports:
      - "3000:80"
    depends_on:
      - app
